name: Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_lint_test:
    runs-on: ubuntu-latest
    steps:
    - name: Check out the code. 
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Linting with Dotnet Format
      run: dotnet format --verify-no-changes --verbosity diagnostic

    - name: Check for warnings with dotnet build
      run: dotnet build --warnaserror --no-restore

    - name: Run the unit tests.
      run: dotnet test Cafeteria.UnitTests/Cafeteria.UnitTests.csproj --no-build

    - name: Run the integration tests.
      run: dotnet test Cafeteria.IntegrationTests/Cafeteria.IntegrationTests.csproj --no-build

  build_and_push_containers_to_dockerhub:
    needs: [build_lint_test]
    runs-on: ubuntu-latest
    steps:
    - name: Check out the code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push API to DockerHub
      run: |
        docker build \
          -f ./Cafeteria.Api/Dockerfile \
          -t ${{ vars.DOCKERHUB_USERNAME }}/cafeteria-api:${{ github.run_number }}.${{ github.run_attempt }} \
          .
        docker push -q ${{ vars.DOCKERHUB_USERNAME }}/cafeteria-api:${{ github.run_number }}.${{ github.run_attempt }}

    - name: Build and push Customer to DockerHub
      run: |
        docker build \
          -f ./Cafeteria.Customer/Dockerfile \
          -t ${{ vars.DOCKERHUB_USERNAME }}/cafeteria-customer:${{ github.run_number }}.${{ github.run_attempt }} \
          .
        docker push -q ${{ vars.DOCKERHUB_USERNAME }}/cafeteria-customer:${{ github.run_number }}.${{ github.run_attempt }}

    - name: Build and push Management to DockerHub
      run: |
        docker build \
          -f ./Cafeteria.Management/Dockerfile \
          -t ${{ vars.DOCKERHUB_USERNAME }}/cafeteria-management:${{ github.run_number }}.${{ github.run_attempt }} \
          .
        docker push -q ${{ vars.DOCKERHUB_USERNAME }}/cafeteria-management:${{ github.run_number }}.${{ github.run_attempt }}

  deploy_to_aks:
    needs: [build_and_push_containers_to_dockerhub]
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: ${{ github.workspace }}/.kube/config
    steps:
    - name: Check out the code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig from secret
      run: |
        if [[ -z "${{ secrets.KUBE_CONFIG }}" ]]; then
          echo "KUBE_CONFIG secret is required." >&2
          exit 1
        fi

        mkdir -p "$(dirname "$KUBECONFIG")"
        printf '%s' "${{ secrets.KUBE_CONFIG }}" > "$KUBECONFIG"
        chmod 600 "$KUBECONFIG"

    - name: Verify kubectl access
      run: |
        kubectl version --client
        kubectl config current-context
        kubectl get nodes

    - name: Install envsubst
      run: sudo apt-get update && sudo apt-get install -y gettext-base

    - name: Install ingress-nginx
      run: |
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.3/deploy/static/provider/cloud/deploy.yaml
        kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=300s

    - name: Install cert-manager
      run: |
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
        kubectl -n cert-manager rollout status deployment/cert-manager --timeout=180s
        kubectl -n cert-manager rollout status deployment/cert-manager-cainjector --timeout=180s
        kubectl -n cert-manager rollout status deployment/cert-manager-webhook --timeout=180s

    - name: Deploy to AKS
      env:
        CONTAINER_VERSION: ${{ github.run_number }}.${{ github.run_attempt }}
        ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        TAILSCALE_KEY: ${{ secrets.TAILSCALE_KEY }}
        BASE_DOMAIN: ${{ vars.BASE_DOMAIN }}
      run: |
        if [[ -z "${BASE_DOMAIN}" ]]; then
          echo "BASE_DOMAIN GitHub variable is required." >&2
          exit 1
        fi

        if [[ -z "${TAILSCALE_KEY}" ]]; then
          echo "TAILSCALE_KEY GitHub secret is required." >&2
          exit 1
        fi

        kubectl apply -f kube/namespace.yml

        kubectl -n cert-manager create secret generic cloudflare-api-token-secret \
          --from-literal=api-token="${CLOUDFLARE_API_TOKEN}" \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl -n cafeteria create secret generic tailscale-auth \
          --from-literal=TS_AUTHKEY="${TAILSCALE_KEY}" \
          --dry-run=client -o yaml | kubectl apply -f -

        envsubst < kube/cert-manager-clusterissuer.yml | kubectl apply -f -

        for FILE in kube/*.yml
        do
          BASE_NAME="$(basename "$FILE")"
          if [[ "$BASE_NAME" == "namespace.yml" || "$BASE_NAME" == "cert-manager-clusterissuer.yml" ]]; then
            continue
          fi

          envsubst < "$FILE" | kubectl apply -f -
        done

  notify_discord:
    runs-on: ubuntu-latest
    needs: [deploy_to_aks]
    if: always()
    steps:
    - name: Send Discord notification
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DEPLOY_MAIN_DISCORD }}
        title: "Snow Cafeteria Portal - Merged Into Main, Deploying"
        description: "Deployment workflow completed"
        url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        status: ${{ job.status }}

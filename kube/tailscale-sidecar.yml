apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-sidecar
  namespace: cafeteria

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-sidecar
  namespace: cafeteria
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tailscale"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-sidecar
  namespace: cafeteria
subjects:
  - kind: ServiceAccount
    name: tailscale-sidecar
    namespace: cafeteria
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tailscale-sidecar

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafeteria-api-server-dep
  namespace: cafeteria
spec:
  selector:
    matchLabels:
      app: cafeteria-api
  template:
    metadata:
      labels:
        app: cafeteria-api
    spec:
      serviceAccountName: tailscale-sidecar
      containers:
        - name: tailscale-sidecar
          image: tailscale/tailscale:stable
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_KUBE_SECRET
              value: tailscale
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "false"
            - name: TS_ACCEPT_DNS
              value: "false"
            - name: TS_EXTRA_ARGS
              value: "--accept-routes --reset"
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: dev-net-tun
              mountPath: /dev/net/tun
      volumes:
        - name: tailscale-state
          emptyDir: {}
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice

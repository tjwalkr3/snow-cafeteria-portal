apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafeteria-customer-dep
  namespace: cafeteria
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cafeteria-customer

  template:
    metadata:
      labels:
        app: cafeteria-customer
    spec:
      containers:
        - name: cafeteria-customer-container
          image: tjwalkr3/cafeteria-customer:$CONTAINER_VERSION
          env:
            - name: ApiBaseUrl
              value: "http://cafeteria-api-svc:8080/api/"
            - name: OpenIDConnectSettings__Authority
              value: "http://cafeteria-keycloak-svc:8080/realms/AppRealm"
            - name: OpenIDConnectSettings__ClientId
              value: "customer"
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: cafeteria-customer-svc
  namespace: cafeteria
spec:
  selector:
    app: cafeteria-customer
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
